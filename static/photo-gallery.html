<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Photo Gallery Of Seattle</title>
        <link rel="stylesheet" href="styles.css">

    </head>
    <body>
        <header>
            <h1>Photo Gallery Of Seattle</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="top-attractions.html">Top Attractions</a></li>
                    <li><a href="photo-gallery.html">Photo Gallery</a></li>
                    <li><a href="guide.html">Guide Page</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="gallery-intro">
                <h2>Discover Seattle Through Photos</h2>
                <p>Explore the beauty and culture of the Emerald City through our curated collection of stunning images. Click any photo to see more.</p>
            </section>

            <section class="photo-gallery">
                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/400x300/0066CC/FFFFFF?text=Space+Needle+Sunset" alt="Space Needle at sunset with orange sky">
                    <figcaption class="brief-description">Golden Hour at the Needle</figcaption>
                    <div class="detailed-info">
                        <h3>Space Needle Sunset</h3>
                        <p>The iconic Space Needle stands tall against a breathtaking Pacific Northwest sunset. This view from Kerry Park is one of Seattle's most photographed scenes.</p>
                    </div>
                </figure>

                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/400x300/0066CC/FFFFFF?text=Pike+Place+Neon" alt="Pike Place Market neon sign at night">
                    <figcaption class="brief-description">Pike Place After Dark</figcaption>
                    <div class="detailed-info">
                        <h3>Pike Place Market Sign</h3>
                        <p>The famous neon Public Market sign has welcomed visitors since 1907. Best captured during blue hour when the lights glow against the twilight sky.</p>
                    </div>
                </figure>

                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/400x300/0066CC/FFFFFF?text=Kerry+Park+Skyline" alt="Seattle skyline from Kerry Park">
                    <figcaption class="brief-description">Skyline from Kerry Park</figcaption>
                    <div class="detailed-info">
                        <h3>Kerry Park Vista</h3>
                        <p>The quintessential Seattle skyline view featuring downtown, the Space Needle, and Mount Rainier on clear days. A favorite spot for photographers and tourists alike.</p>
                    </div>
                </figure>

                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/400x300/0066CC/FFFFFF?text=Gum+Wall" alt="Colorful gum wall art installation">
                    <figcaption class="brief-description">The Famous Gum Wall</figcaption>
                    <div class="detailed-info">
                        <h3>Post Alley Gum Wall</h3>
                        <p>One of Seattle's quirkiest attractions - a brick wall covered in colorful chewed gum. Located in Post Alley near Pike Place Market, it's become an unusual local landmark.</p>
                    </div>
                </figure>

                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/400x300/0066CC/FFFFFF?text=Great+Wheel" alt="Seattle Great Wheel on the waterfront">
                    <figcaption class="brief-description">Great Wheel Lights</figcaption>
                    <div class="detailed-info">
                        <h3>Seattle Great Wheel</h3>
                        <p>Standing 175 feet tall on Pier 57, the Great Wheel offers stunning views of Elliott Bay and the city. At night, its LED lights create a colorful beacon on the waterfront.</p>
                    </div>
                </figure>

                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/400x300/0066CC/FFFFFF?text=Chihuly+Glass" alt="Dale Chihuly glass art installation">
                    <figcaption class="brief-description">Chihuly's Glass Magic</figcaption>
                    <div class="detailed-info">
                        <h3>Chihuly Garden and Glass</h3>
                        <p>Dale Chihuly's vibrant glass sculptures transform light and color into art. This Seattle native's work is displayed in breathtaking installations throughout the museum and garden.</p>
                    </div>
                </figure>

                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/400x300/0066CC/FFFFFF?text=Fremont+Troll" alt="Fremont Troll sculpture under bridge">
                    <figcaption class="brief-description">The Fremont Troll</figcaption>
                    <div class="detailed-info">
                        <h3>Fremont Troll</h3>
                        <p>This whimsical 18-foot sculpture lurks beneath the north end of the Aurora Bridge, clutching an actual Volkswagen Beetle. A beloved symbol of Seattle's quirky Fremont neighborhood.</p>
                    </div>
                </figure>

                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/400x300/0066CC/FFFFFF?text=Mount+Rainier" alt="Mount Rainier visible from Seattle">
                    <figcaption class="brief-description">The Mountain is Out</figcaption>
                    <div class="detailed-info">
                        <h3>Mount Rainier</h3>
                        <p>Locals say "the mountain is out" when Rainier is visible through the clouds. At 14,411 feet, this active volcano dominates the horizon on clear days.</p>
                    </div>
                </figure>
            </section>
        </main>

    </body>
</html>
